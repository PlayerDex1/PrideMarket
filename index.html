  <!-- Script Anti-DevTools (Dificulta Botão Direito e F12) -->
  <script>
    document.addEventListener('contextmenu', event => event.preventDefault());

    window.addEventListener('keydown', function (e) {
      // Bloqueia F12
      if (e.key === 'F12') {
        e.preventDefault();
      }
      // Bloqueia Ctrl+Shift+I (Abre Ferramentas de Dev) / Cmd+Option+I (Mac)
      if ((e.ctrlKey && e.shiftKey && e.key === 'I') || (e.ctrlKey && e.shiftKey && e.key === 'i') || (e.metaKey && e.altKey && e.key === 'I') || (e.metaKey && e.altKey && e.key === 'i')) {
        e.preventDefault();
      }
      // Bloqueia Ctrl+Shift+J (Abre Console) / Cmd+Option+J (Mac)
      if ((e.ctrlKey && e.shiftKey && e.key === 'J') || (e.ctrlKey && e.shiftKey && e.key === 'j') || (e.metaKey && e.altKey && e.key === 'J') || (e.metaKey && e.altKey && e.key === 'j')) {
        e.preventDefault();
      }
      // Bloqueia Ctrl+U (Ver Código Fonte) / Cmd+U (Mac)
      if ((e.ctrlKey && e.key === 'U') || (e.ctrlKey && e.key === 'u') || (e.metaKey && e.key === 'U') || (e.metaKey && e.key === 'u')) {
        e.preventDefault();
      }
    });
